<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="MATCHPOINT — pickleball para Ecuador">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#022c22"/>
      <stop offset="0.6" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#0e7a5d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.3" r="0.55">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32,0 L0,0 0,32" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- court line backdrop -->
  <g stroke="#ffffff" stroke-opacity="0.13" stroke-width="2" fill="none">
    <rect x="80" y="80" width="1040" height="470" rx="8"/>
    <line x1="600" y1="80" x2="600" y2="550"/>
    <line x1="80" y1="315" x2="340" y2="315"/>
    <line x1="860" y1="315" x2="1120" y2="315"/>
    <line x1="340" y1="80" x2="340" y2="550"/>
    <line x1="860" y1="80" x2="860" y2="550"/>
  </g>

  <!-- centered ball motif -->
  <g transform="translate(600 290)">
    <circle r="84" fill="#fde68a" fill-opacity="0.16"/>
    <circle r="62" fill="#fde68a" fill-opacity="0.28"/>
    <circle r="44" fill="#fde68a"/>
    <circle r="44" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2"/>
    <g stroke="#064e3b" stroke-opacity="0.6" stroke-width="2" fill="none">
      <circle r="8"/>
      <circle r="18"/>
      <circle r="28"/>
      <circle r="38"/>
    </g>
  </g>

  <!-- brand lockup centered -->
  <g text-anchor="middle">
    <text x="600" y="450" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-0.02em">MATCHPOINT</text>
    <text x="600" y="495" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#a7f3d0" letter-spacing="0.04em">PICKLEBALL · ECUADOR</text>
  </g>

  <rect width="1200" height="630" fill="url(#grain)"/>
</svg>
