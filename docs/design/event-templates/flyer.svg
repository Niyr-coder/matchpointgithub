<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="Flyer convocatoria — Pro Series Quito — MATCHPOINT">
  <title>Flyer convocatoria — Pro Series Quito — MATCHPOINT</title>
  <desc>Plantilla de flyer de convocatoria de parada del circuito Pro Series. Formato IG-square 1080x1080. El mismo layout escala a A4 (proporción 1:1 → recortar a A4 en export usando margen interior 15mm — el bloque central cabe en 180x267mm). Placeholder de ciudad y mes: sustituir Quito/Septiembre por la parada real.</desc>

  <defs>
    <style>
      .heading { font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif; font-weight: 900; letter-spacing: -0.02em; }
      .section { font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif; font-weight: 800; letter-spacing: -0.01em; }
      .chip { font-family: "Inter", system-ui, sans-serif; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
      .body { font-family: "Inter", system-ui, sans-serif; font-weight: 500; }
      .strong { font-family: "Inter", system-ui, sans-serif; font-weight: 700; letter-spacing: -0.01em; }
      .num { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; }
    </style>
    <linearGradient id="skyfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d1a17"/>
    </linearGradient>
    <radialGradient id="cornerglow" cx="90%" cy="10%" r="70%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.30)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#skyfade)"/>
  <rect width="1080" height="1080" fill="url(#cornerglow)"/>

  <!-- Top strip: circuit id -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="360" height="42" rx="21" fill="rgba(16,185,129,0.15)"/>
    <text x="24" y="28" class="chip" font-size="16" fill="#10b981">CIRCUITO PRO SERIES · 2026</text>
  </g>

  <!-- Right-top: green dot brand mark -->
  <g transform="translate(960,60)">
    <circle cx="30" cy="21" r="12" fill="#10b981"/>
    <text x="30" y="72" class="chip" font-size="11" fill="#a3a3a3" text-anchor="middle">MP</text>
  </g>

  <!-- Big wordmark: parada -->
  <g transform="translate(60,220)">
    <text x="0" y="0" class="chip" font-size="18" fill="#a3a3a3">PARADA · SEPTIEMBRE</text>
    <text x="0" y="90" class="heading" font-size="112" fill="#ffffff">PRO SERIES</text>
    <text x="0" y="200" class="heading" font-size="112" fill="#10b981">QUITO</text>
  </g>

  <!-- Divider -->
  <rect x="60" y="470" width="80" height="4" rx="2" fill="#10b981"/>

  <!-- Key info grid -->
  <g transform="translate(60,510)">
    <!-- Fecha -->
    <g transform="translate(0,0)">
      <text x="0" y="0" class="chip" font-size="12" fill="#737373">FECHA</text>
      <text x="0" y="42" class="section" font-size="30" fill="#ffffff">Sábado 12</text>
      <text x="0" y="76" class="body" font-size="18" fill="#a3a3a3">Septiembre · 07:30 h</text>
    </g>
    <!-- Sede -->
    <g transform="translate(320,0)">
      <text x="0" y="0" class="chip" font-size="12" fill="#737373">SEDE</text>
      <text x="0" y="42" class="section" font-size="30" fill="#ffffff">Club Los Chillos</text>
      <text x="0" y="76" class="body" font-size="18" fill="#a3a3a3">Quito · Canchas 1 y 2</text>
    </g>
    <!-- Categorías -->
    <g transform="translate(660,0)">
      <text x="0" y="0" class="chip" font-size="12" fill="#737373">CATEGORÍAS</text>
      <text x="0" y="42" class="section" font-size="30" fill="#ffffff">Dobles Open</text>
      <text x="0" y="76" class="body" font-size="18" fill="#a3a3a3">MPR 3.5 · 4.0 · 4.5</text>
    </g>
  </g>

  <!-- Prize pool + ranking hint card -->
  <g transform="translate(60,680)">
    <rect x="0" y="0" width="960" height="140" rx="20" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.35)"/>
    <g transform="translate(30,30)">
      <text x="0" y="0" class="chip" font-size="13" fill="#fbbf24">PREMIO POOL · SUMA MATCHPOINT RANKING</text>
      <text x="0" y="60" class="num" font-size="64" fill="#ffffff">$1,200</text>
      <text x="260" y="42" class="body" font-size="18" fill="#a3a3a3">USD repartidos entre 1° / 2° / 3° de cada categoría</text>
      <text x="260" y="72" class="strong" font-size="18" fill="#fbbf24">+100 puntos al MATCHPOINT Ranking 2026</text>
    </g>
    <!-- Trophy icon accent -->
    <g transform="translate(820,30)" stroke="#fbbf24" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" fill="none">
      <path d="M18 6 h44 v22 a22 22 0 0 1 -44 0z"/>
      <path d="M18 12 h-10 a10 10 0 0 0 0 20 h10"/>
      <path d="M62 12 h10 a10 10 0 0 1 0 20 h-10"/>
      <path d="M28 58 h24 M22 68 h36"/>
      <line x1="40" y1="46" x2="40" y2="58"/>
    </g>
  </g>

  <!-- CTA + closing -->
  <g transform="translate(60,860)">
    <rect x="0" y="0" width="960" height="100" rx="22" fill="#10b981"/>
    <text x="40" y="42" class="chip" font-size="16" fill="#0a0a0a">INSCRIPCIONES ABIERTAS · CIERRE VIERNES 20H</text>
    <text x="40" y="80" class="heading" font-size="34" fill="#0a0a0a">matchpoint.top/pro-series-quito</text>
  </g>

  <!-- Footer signature -->
  <g transform="translate(60,1000)">
    <circle cx="10" cy="16" r="8" fill="#10b981"/>
    <text x="26" y="22" class="heading" font-size="22" fill="#ffffff">MATCHPOINT</text>
    <text x="960" y="22" class="body" font-size="14" fill="#737373" text-anchor="end">@matchpoint.ec · matchpoint.top</text>
  </g>
</svg>
