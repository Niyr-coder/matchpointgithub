<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Blog MATCHPOINT — comunidad, clubes y juego del pickleball ecuatoriano">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#022c22"/>
      <stop offset="0.55" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#a7f3d0" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paddle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#a7f3d0" stop-opacity="0.92"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32,0 L0,0 0,32" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- court line backdrop -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" fill="none">
    <rect x="80" y="80" width="1040" height="470" rx="8"/>
    <line x1="600" y1="80" x2="600" y2="550"/>
    <line x1="80" y1="315" x2="340" y2="315"/>
    <line x1="860" y1="315" x2="1120" y2="315"/>
  </g>

  <!-- paddle illustration top-right -->
  <g transform="translate(940 200) rotate(20)">
    <rect x="-12" y="120" width="24" height="140" rx="10" fill="#0f3a2c"/>
    <ellipse cx="0" cy="40" rx="100" ry="120" fill="url(#paddle)"/>
    <ellipse cx="0" cy="40" rx="100" ry="120" fill="none" stroke="#064e3b" stroke-opacity="0.4" stroke-width="3"/>
    <ellipse cx="-26" cy="0" rx="32" ry="46" fill="#ffffff" fill-opacity="0.32"/>
  </g>

  <!-- ball -->
  <g transform="translate(820 380)">
    <circle r="28" fill="#fde68a"/>
    <circle r="28" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"/>
    <g stroke="#064e3b" stroke-opacity="0.7" stroke-width="2" fill="none">
      <circle r="6"/>
      <circle r="13"/>
      <circle r="20"/>
    </g>
  </g>

  <!-- brand lockup -->
  <g>
    <!-- eyebrow chip -->
    <g transform="translate(80 100)">
      <rect x="0" y="0" width="76" height="30" rx="15" fill="#10b981"/>
      <text x="38" y="20" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#022c22" text-anchor="middle" letter-spacing="0.06em">BLOG</text>
    </g>
    <!-- title lockup -->
    <text x="80" y="260" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="96" font-weight="900" fill="#ffffff" letter-spacing="-0.025em">MATCHPOINT</text>
    <text x="80" y="330" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#a7f3d0" letter-spacing="-0.005em">Pickleball, comunidad y clubes — Ecuador</text>
    <!-- accent rule -->
    <rect x="80" y="370" width="120" height="6" rx="3" fill="#10b981"/>
  </g>

  <!-- url footer -->
  <text x="80" y="580" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff" fill-opacity="0.78">matchpoint.top/blog</text>

  <rect width="1200" height="630" fill="url(#grain)"/>
</svg>
