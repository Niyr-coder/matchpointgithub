<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3480 1920" width="3480" height="1920" role="img" aria-label="Reel resumen — frames base — MATCHPOINT">
  <title>Reel resumen — frames base — Pro Series Quito — MATCHPOINT</title>
  <desc>Frames base para un reel resumen de parada. Tres frames en fila, cada uno 1080x1920 con gutter de 60px. Frame 1 (intro): sub-marca + fecha + hook. Frame 2 (data): número destacado (jugadores, MPR promedio, partidos) — el motion designer anima el número. Frame 3 (outro): CTA de próxima parada + wordmark. El motion designer decide transiciones — el layout es la fuente de verdad de tipografía, jerarquía y color por frame. Ejemplo poblado con la parada Pro Series Quito.</desc>

  <defs>
    <style>
      .heading { font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif; font-weight: 900; letter-spacing: -0.02em; }
      .section { font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif; font-weight: 800; letter-spacing: -0.01em; }
      .chip { font-family: "Inter", system-ui, sans-serif; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; }
      .body { font-family: "Inter", system-ui, sans-serif; font-weight: 500; }
      .num { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.05em; }
      .frame-label { font-family: "Inter", system-ui, sans-serif; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; }
    </style>
    <linearGradient id="frame1bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0e1e18"/>
    </linearGradient>
    <linearGradient id="frame3bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a14"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="frame2glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Doc background (neutral so frames pop) -->
  <rect width="3480" height="1920" fill="#f5f5f5"/>

  <!-- ============ FRAME 1 · INTRO ============ -->
  <g transform="translate(0,0)">
    <rect x="0" y="0" width="1080" height="1920" fill="url(#frame1bg)"/>
    <!-- Frame label top-left (docs affordance) -->
    <text x="40" y="80" class="frame-label" font-size="20" fill="#3a3a3a">FRAME 1 · INTRO · 0-2s</text>

    <!-- Top chip -->
    <g transform="translate(80,320)">
      <rect x="0" y="0" width="380" height="48" rx="24" fill="rgba(16,185,129,0.20)" stroke="rgba(16,185,129,0.40)"/>
      <text x="28" y="32" class="chip" font-size="18" fill="#10b981">CIRCUITO PRO SERIES · 2026</text>
    </g>

    <!-- Hook copy -->
    <g transform="translate(80,480)">
      <text x="0" y="0" class="chip" font-size="20" fill="#a3a3a3">ASÍ SE VIVIÓ</text>
      <text x="0" y="140" class="heading" font-size="132" fill="#ffffff">PRO SERIES</text>
      <text x="0" y="270" class="heading" font-size="132" fill="#10b981">QUITO</text>
      <text x="0" y="360" class="body" font-size="30" fill="#a3a3a3">Sábado 12 · Septiembre 2026</text>
    </g>

    <!-- Footer -->
    <g transform="translate(80,1780)">
      <circle cx="10" cy="16" r="8" fill="#10b981"/>
      <text x="26" y="22" class="heading" font-size="26" fill="#ffffff">MATCHPOINT</text>
      <text x="920" y="22" class="body" font-size="16" fill="#737373" text-anchor="end">@matchpoint.ec</text>
    </g>
  </g>

  <!-- ============ FRAME 2 · DATA ============ -->
  <g transform="translate(1200,0)">
    <rect x="0" y="0" width="1080" height="1920" fill="#0a0a0a"/>
    <rect x="0" y="0" width="1080" height="1920" fill="url(#frame2glow)"/>
    <text x="40" y="80" class="frame-label" font-size="20" fill="#3a3a3a">FRAME 2 · HIGHLIGHT · 2-4s</text>

    <!-- Small header -->
    <g transform="translate(80,320)">
      <text x="0" y="0" class="chip" font-size="18" fill="#a3a3a3">CIFRAS DE LA PARADA</text>
    </g>

    <!-- Huge number -->
    <g transform="translate(80,480)">
      <text x="0" y="0" class="num" font-size="440" fill="#10b981">48</text>
    </g>
    <g transform="translate(80,980)">
      <text x="0" y="0" class="heading" font-size="72" fill="#ffffff">parejas en cancha</text>
      <text x="0" y="112" class="body" font-size="30" fill="#a3a3a3">3 categorías · MPR promedio 4.1 · 62 partidos</text>
    </g>

    <!-- Three secondary stats -->
    <g transform="translate(80,1280)">
      <line x1="0" y1="0" x2="920" y2="0" stroke="#2a2a2a"/>
      <g transform="translate(0,60)">
        <text x="0" y="0" class="chip" font-size="16" fill="#10b981">1° DOBLES OPEN</text>
        <text x="0" y="52" class="section" font-size="42" fill="#ffffff">Herrera / Vega</text>
      </g>
      <g transform="translate(0,180)">
        <text x="0" y="0" class="chip" font-size="16" fill="#10b981">PUNTAJE FINAL</text>
        <text x="0" y="52" class="section" font-size="42" fill="#ffffff">15-11 · 11-15 · 15-7</text>
      </g>
    </g>

    <g transform="translate(80,1780)">
      <circle cx="10" cy="16" r="8" fill="#10b981"/>
      <text x="26" y="22" class="heading" font-size="26" fill="#ffffff">MATCHPOINT</text>
      <text x="920" y="22" class="body" font-size="16" fill="#737373" text-anchor="end">Pro Series · Quito</text>
    </g>
  </g>

  <!-- ============ FRAME 3 · OUTRO / CTA ============ -->
  <g transform="translate(2400,0)">
    <rect x="0" y="0" width="1080" height="1920" fill="url(#frame3bg)"/>
    <text x="40" y="80" class="frame-label" font-size="20" fill="#3a3a3a">FRAME 3 · CTA · 4-6s</text>

    <g transform="translate(80,340)">
      <text x="0" y="0" class="chip" font-size="20" fill="#a3a3a3">PRÓXIMA PARADA</text>
      <text x="0" y="120" class="heading" font-size="112" fill="#ffffff">PRO SERIES</text>
      <text x="0" y="230" class="heading" font-size="112" fill="#10b981">GUAYAQUIL</text>
      <text x="0" y="310" class="body" font-size="28" fill="#a3a3a3">Sábado 17 · Octubre 2026</text>
    </g>

    <!-- Ranking teaser -->
    <g transform="translate(80,880)">
      <rect x="0" y="0" width="920" height="180" rx="22" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.35)"/>
      <text x="30" y="50" class="chip" font-size="16" fill="#fbbf24">MATCHPOINT RANKING · TEMPORADA 2026</text>
      <text x="30" y="110" class="section" font-size="38" fill="#ffffff">Herrera lidera con 240 pts</text>
      <text x="30" y="150" class="body" font-size="22" fill="#a3a3a3">Consulta tu posición en matchpoint.top/ranking</text>
    </g>

    <!-- Big CTA -->
    <g transform="translate(80,1200)">
      <rect x="0" y="0" width="920" height="140" rx="24" fill="#10b981"/>
      <text x="40" y="60" class="chip" font-size="20" fill="#0a0a0a">INSCRIPCIONES ABIERTAS</text>
      <text x="40" y="112" class="heading" font-size="42" fill="#0a0a0a">matchpoint.top</text>
    </g>

    <!-- Footer -->
    <g transform="translate(80,1780)">
      <circle cx="10" cy="16" r="8" fill="#10b981"/>
      <text x="26" y="22" class="heading" font-size="26" fill="#ffffff">MATCHPOINT</text>
      <text x="920" y="22" class="body" font-size="16" fill="#737373" text-anchor="end">@matchpoint.ec</text>
    </g>
  </g>

  <!-- Gutter labels between frames (docs affordance) -->
  <g fill="#a3a3a3" class="frame-label" font-size="16">
    <text x="1140" y="960" text-anchor="middle" transform="rotate(90,1140,960)">↓ transición</text>
    <text x="2340" y="960" text-anchor="middle" transform="rotate(90,2340,960)">↓ transición</text>
  </g>
</svg>
